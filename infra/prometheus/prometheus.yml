global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'lectify-dev'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: /minio/v2/metrics/cluster

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
