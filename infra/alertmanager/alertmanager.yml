global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@lectify'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: http://host.docker.internal:9003/webhook
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: http://host.docker.internal:9003/webhook-critical
        send_resolved: true

  - name: 'warning-alerts'
    webhook_configs:
      - url: http://host.docker.internal:9003/webhook-warning
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'cluster', 'service']
