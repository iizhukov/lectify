services:
  postgres:
    image: postgres:16-alpine
    container_name: lectify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lectify
      POSTGRES_PASSWORD: lectify_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lectify"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lectify-network

  minio:
    image: minio/minio:latest
    container_name: lectify-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lectify-network

  createbuckets:
    image: minio/mc:latest
    container_name: lectify-minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/lectify-artifacts --ignore-existing;
      mc mb myminio/lectify-logs --ignore-existing;
      mc anonymous set download myminio/lectify-artifacts;
      mc anonymous set download myminio/lectify-logs;
      exit 0
      "
    networks:
      - lectify-network

  vault:
    image: hashicorp/vault:1.16
    container_name: lectify-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/var/lib/vault
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "vault status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lectify-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: lectify-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - lectify-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: lectify-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - lectify-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: lectify-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: lectify
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8080:8080"
    networks:
      - lectify-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: lectify-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/scrape:/etc/prometheus/scrape:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lectify-network

  loki:
    image: grafana/loki:3.0.0
    container_name: lectify-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - lectify-network

  promtail:
    image: grafana/promtail:3.0.0
    container_name: lectify-promtail
    restart: unless-stopped
    depends_on:
      - loki
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lectify-network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: lectify-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo HTTP (used by Grafana)
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - lectify-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: lectify-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - lectify-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: lectify-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - lectify-network

  gateway-nginx:
    image: nginx:alpine
    container_name: lectify-gateway-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lectify-network

  mkdocs:
    build:
      context: ./mkdocs
      dockerfile: Dockerfile
    container_name: lectify-mkdocs
    restart: unless-stopped
    working_dir: /src
    volumes:
      - ../docs:/src/docs:ro
      - ./mkdocs/mkdocs.yml:/src/mkdocs.yml:ro
    command: serve -f /src/mkdocs.yml --dev-addr 0.0.0.0:8000
    ports:
      - "8000:8000"
    networks:
      - lectify-network

networks:
  lectify-network:

volumes:
  postgres_data:
  minio_data:
  vault_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  alertmanager_data:
