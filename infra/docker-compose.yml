services:
  postgres:
    image: postgres:16-alpine
    container_name: lectify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-script.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lectify-network

  minio:
    image: minio/minio:latest
    container_name: lectify-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"   # API
      - "${MINIO_CONSOLE_PORT}:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lectify-network

  minio-init:
    image: minio/mc:latest
    container_name: lectify-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/init-script.sh:/init-script.sh
    entrypoint: /init-script.sh
    networks:
      - lectify-network

  vault:
    image: hashicorp/vault:1.16
    container_name: lectify-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "${VAULT_PORT}:8200"
    volumes:
      - vault_data:/var/lib/vault
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "vault status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lectify-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: lectify-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:2181"
    networks:
      - lectify-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: lectify-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - lectify-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: lectify-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: lectify
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:${KAFKA_INTERNAL_PORT}
    ports:
      - "${KAFKA_UI_PORT}:8080"
    networks:
      - lectify-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: lectify-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/scrape:/etc/prometheus/scrape:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lectify-network

  loki:
    image: grafana/loki:3.0.0
    container_name: lectify-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - lectify-network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: lectify-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo.yaml
    ports:
      - "${TEMPO_GRPC_PORT}:4317"   # OTLP gRPC
      - "${TEMPO_HTTP_PORT}:4318"   # OTLP HTTP
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - lectify-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: lectify-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - lectify-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: lectify-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - lectify-network

  nginx:
    image: nginx:alpine
    container_name: lectify-gateway-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lectify-network

  mkdocs:
    build:
      context: ./mkdocs
      dockerfile: Dockerfile
    container_name: lectify-mkdocs
    restart: unless-stopped
    working_dir: /src
    volumes:
      - ../docs:/src/docs:ro
      - ./mkdocs/mkdocs.yml:/src/mkdocs.yml:ro
    command: serve -f /src/mkdocs.yml --dev-addr 0.0.0.0:8000
    ports:
      - "${MKDOCS_PORT}:8000"
    networks:
      - lectify-network

networks:
  lectify-network:

volumes:
  postgres_data:
  minio_data:
  vault_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  alertmanager_data:
