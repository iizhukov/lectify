# Tempo
server {
    listen 80;
    server_name tempo.localhost;

    location / {
        proxy_pass http://lectify-tempo:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Catch-all: root → docs
server {
    listen 80 default_server;
    server_name _;

    location = / {
        return 302 http://docs.localhost;
    }

    location / {
        return 404;
    }
}
