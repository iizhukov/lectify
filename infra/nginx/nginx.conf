resolver 127.0.0.11 valid=10s ipv6=off;

# Grafana
server {
    listen 80;
    server_name grafana.localhost;

    location / {
        proxy_pass http://lectify-grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

