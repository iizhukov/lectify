global:
  resolve_timeout: 5m

# Шаблоны для уведомлений
templates:
  - '/etc/alertmanager/*.tmpl'

# Маршрутизация алертов
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  routes:
    # Критические алерты - немедленно
    - match:
        severity: critical
      receiver: 'telegram-critical'
      group_wait: 0s
      repeat_interval: 5m

    # Предупреждения - с группировкой
    - match:
        severity: warning
      receiver: 'telegram-warning'
      group_wait: 30s
      repeat_interval: 1h

    # Информационные - раз в день
    - match:
        severity: info
      receiver: 'telegram-info'
      repeat_interval: 24h

# Получатели уведомлений
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://host.docker.internal:5001/api/alerts/webhook'
        send_resolved: true

  # Telegram боты - задел для интеграции
  # Раскомментируйте и настройте после создания бота в Telegram
  - name: 'telegram-critical'
    webhook_configs:
      - url: 'http://host.docker.internal:5001/api/alerts/webhook'
        send_resolved: true
    # telegram_configs:
    #   - api_url: 'https://api.telegram.org'
    #     bot_token: 'YOUR_BOT_TOKEN'
    #     chat_id: 'YOUR_CHAT_ID'
    #     message: |
    #       🚨 *{{ .Status }}*: {{ .GroupLabels.alertname }}
    #       {{ range .Alerts }}
    #       *{{ .Labels.alertname }}*
    #       Severity: {{ .Labels.severity }}
    #       {{ .Annotations.description }}
    #       {{ end }}

  - name: 'telegram-warning'
    webhook_configs:
      - url: 'http://host.docker.internal:5001/api/alerts/webhook'
        send_resolved: true
    # telegram_configs:
    #   - api_url: 'https://api.telegram.org'
    #     bot_token: 'YOUR_BOT_TOKEN'
    #     chat_id: 'YOUR_CHAT_ID'
    #     message: |
    #       ⚠️ *{{ .Status }}*: {{ .GroupLabels.alertname }}
    #       {{ range .Alerts }}
    #       *{{ .Labels.alertname }}*
    #       {{ .Annotations.description }}
    #       {{ end }}

  - name: 'telegram-info'
    webhook_configs:
      - url: 'http://host.docker.internal:5001/api/alerts/webhook'
        send_resolved: true

# Подавление дублирующихся алертов
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']