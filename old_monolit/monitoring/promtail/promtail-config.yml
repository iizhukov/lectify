server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: lectify
    static_configs:
      - targets:
          - localhost
        labels:
          job: lectify
          app: lectify
          __path__: /var/log/lectify/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}),\d{3} - (?P<logger>\S+) - (?P<level>\S+) - (?P<json>{.*})$'

      - json:
          source: json
          expressions:
            event: event
            workflow_id: workflow_id
            file_id: file_id
            error: error
            msg: msg

      - labels:
          level:
          logger:
          event: