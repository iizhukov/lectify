<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Восстановление пароля</title>
  <link href="/static/css/output.css" rel="stylesheet">
  <link href="/static/favicon.svg" rel="icon" type="image/svg+xml">
</head>
<body class="bg-brand-bg min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-brand">Lectify</h1>
    </div>

    <div class="card p-6">
      <h2 class="text-xl font-semibold text-brand-dark mb-2">Восстановить пароль</h2>
      <p class="text-sm text-brand-muted mb-6">Введите email, и мы отправим ссылку для сброса пароля.</p>

      <form id="forgot-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-brand-dark mb-1" for="email">Электронная почта</label>
          <input type="email" id="email" name="email" class="input-field" placeholder="demo@example.com" required autofocus>
        </div>
        <div id="forgot-error" class="text-red-600 text-sm hidden"></div>
        <button type="submit" class="btn-primary w-full py-2.5">Отправить ссылку</button>
      </form>

      <div class="mt-4 text-center">
        <a href="/login" class="text-sm text-brand hover:text-brand-dark">Вернуться ко входу</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <script type="module">
    import { api } from '/static/js/api.js';
    import { showToast } from '/static/js/components/toast.js';

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Отправка...';

      const email = document.getElementById('email').value;
      const errorEl = document.getElementById('forgot-error');
      errorEl.classList.add('hidden');

      try {
        await api.auth.forgotPassword(email);
        showToast('success', 'Ссылка отправлена. Проверьте почту.');
        btn.textContent = 'Отправлено!';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Отправить ссылку';
      }
    });
  </script>
</body>
</html>
