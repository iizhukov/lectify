{% block raw %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Lectify{% endblock %}</title>
  <link href="/static/css/output.css" rel="stylesheet">
  <style>
    #sidebar {
      width: 220px;
      min-width: 220px;
      transition: width 0.2s ease, min-width 0.2s ease;
    }
    #sidebar.collapsed {
      width: 56px;
      min-width: 56px;
    }
    #sidebar.collapsed .sidebar-label,
    #sidebar.collapsed .sidebar-section-title,
    #sidebar.collapsed .sidebar-logo {
      display: none;
    }
    #sidebar.collapsed .sidebar-item {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }
    #sidebar.collapsed .sidebar-item svg {
      margin: 0;
    }
    #sidebar.collapsed #sidebar-toggle {
      transform: rotate(180deg);
    }
    #main-wrapper {
      transition: margin-left 0.2s ease;
    }
  </style>
</head>
<body class="bg-brand-bg text-brand-dark min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="bg-white border-r border-brand-light flex flex-col h-screen sticky top-0 shrink-0 overflow-hidden">

    <!-- Logo / toggle row -->
    <div class="flex items-center h-14 px-3 border-b border-brand-light shrink-0">
      <div class="sidebar-logo flex items-center gap-2 flex-1 min-w-0">
        <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
          </svg>
        </div>
        <span class="text-base font-bold text-brand truncate">Lectify</span>
      </div>
      <button id="sidebar-toggle" class="w-7 h-7 flex items-center justify-center rounded text-brand-muted hover:bg-brand-bg hover:text-brand-dark shrink-0 transition-all duration-200" title="Свернуть боковую панель">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
        </svg>
      </button>
    </div>

    <!-- Nav sections -->
    <nav class="flex-1 overflow-y-auto py-3 px-2 space-y-5">

      <div>
        <p class="sidebar-section-title px-3 mb-1 text-xs font-semibold text-brand-muted uppercase tracking-wider">Основное</p>
        <div class="space-y-0.5">
          <a href="/workflows" data-nav="workflows" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-brand-dark transition-colors">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <span class="sidebar-label">Воркфлоу</span>
          </a>
          <a href="/executions" data-nav="executions" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-brand-dark transition-colors">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="sidebar-label">Конспекты</span>
          </a>
          <a href="/prompts" data-nav="prompts" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-brand-dark transition-colors">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            <span class="sidebar-label">Промпты</span>
          </a>
        </div>
      </div>

      <div>
        <p class="sidebar-section-title px-3 mb-1 text-xs font-semibold text-brand-muted uppercase tracking-wider">Аккаунт</p>
        <div class="space-y-0.5">
          <a href="/profile" data-nav="profile" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-brand-dark hover:bg-brand-bg transition-colors">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="sidebar-label">Профиль</span>
          </a>
        </div>
      </div>

    </nav>

  </aside>

  <!-- Main content -->
  <div id="main-wrapper" class="flex-1 min-w-0 flex flex-col">
    <main class="flex-1 px-6 py-6">
      {% block content %}{% endblock %}
      {% block scripts %}{% endblock %}
    </main>
  </div>

  <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>
  <div id="modal-container"></div>

  <script type="module" src="/static/js/main.js"></script>
  <script>
    (function() {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('sidebar-toggle');

      if (localStorage.getItem('sidebar-collapsed') === '1') {
        sidebar.classList.add('collapsed');
      }

      btn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        const collapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebar-collapsed', collapsed ? '1' : '0');
      });
    })();
  </script>
</body>
</html>
{% endblock %}
