{% extends "base.html" %}

{% block title %}Конспекты{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">

  <div class="flex items-center gap-2 text-sm text-brand-muted mb-6">
    <a href="/executions" class="hover:text-brand-dark">Конспекты</a>
    <span>/</span>
    <span id="exec-id" class="text-brand-dark">-</span>
  </div>

  <div class="card mb-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <div class="flex items-center gap-3 mb-2">
          <h1 id="exec-title" class="text-xl font-bold text-brand-dark">Загрузка...</h1>
          <span id="exec-status-badge" class="badge badge-muted">-</span>
        </div>
        <dl class="flex flex-wrap gap-x-6 gap-y-1 text-sm text-brand-muted">
          <div><dt class="inline">Сценарий</dt><dd id="exec-workflow" class="inline ml-1">-</dd></div>
          <div><dt class="inline">Файл</dt><dd id="exec-file" class="inline ml-1">-</dd></div>
          <div><dt class="inline">Язык</dt><dd id="exec-language" class="inline ml-1">-</dd></div>
          <div><dt class="inline">Запущен</dt><dd id="exec-started" class="inline ml-1">-</dd></div>
          <div><dt class="inline">Длительность</dt><dd id="exec-duration" class="inline ml-1">-</dd></div>
        </dl>
        <p id="exec-error" class="text-sm text-red-600 mt-2 hidden"></p>
      </div>
      <div class="flex gap-2 shrink-0">
        <button id="restart-btn" class="btn-secondary text-sm hidden">Перезапустить</button>
      </div>
    </div>
  </div>

  <div class="card mb-6">
    <h2 class="text-base font-semibold text-brand-dark mb-4">Граф выполнения</h2>
    <div id="network-loading" class="text-sm text-brand-muted py-8 text-center">Загрузка узлов...</div>
    <svg id="network-svg" class="w-full" style="min-height:200px" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="card mb-6">
    <h2 class="text-base font-semibold text-brand-dark mb-4">Артефакты</h2>
    <div id="artifacts-list" class="space-y-2"></div>
    <div id="artifacts-empty" class="hidden text-sm text-brand-muted text-center py-6">Артефактов пока нет.</div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script type="module">
  import { api } from '/static/js/api.js';
  import { showModal } from '/static/js/components/modal.js';
  import { showToast } from '/static/js/components/toast.js';
  import { renderNetworkGraph } from '/static/js/components/network-graph.js';

  let _alive = false; // SPA cleanup guard

  const execId = window.location.pathname.split('/').pop();
  const STATUS_STYLES = {
    completed: { badge: 'badge-success', dot: 'bg-green-500', color: '#16a34a' },
    running:   { badge: 'badge-warning', dot: 'bg-yellow-500 animate-pulse', color: '#d97706' },
    failed:    { badge: 'badge-danger',  dot: 'bg-red-500', color: '#dc2626' },
    pending:   { badge: 'badge-muted',   dot: 'bg-gray-400', color: '#9ca3af' },
  };
  const STATUS_LABELS = {
    completed: 'Завершён', running: 'Выполняется', failed: 'Ошибка', pending: 'Ожидание',
  };

  function escapeHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleString('ru-RU');
  }

  function duration(start, end) {
    if (!start || !end) return '-';
    const ms = new Date(end) - new Date(start);
    if (ms < 0) return '-';
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}с`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}м ${s % 60}с`;
    return `${Math.floor(m / 60)}ч ${m % 60}м`;
  }

  function formatBytes(bytes) {
    if (!bytes) return '-';
    const units = ['Б', 'КБ', 'МБ', 'ГБ'];
    let i = 0;
    while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
    return bytes.toFixed(1) + ' ' + units[i];
  }

  function renderHeader(ex) {
    const style = STATUS_STYLES[ex.status] || STATUS_STYLES.pending;
    const idEl = document.getElementById('exec-id');
    idEl.textContent = (ex.id || '').slice(0, 12);
    idEl.dataset.execId = ex.id || '';
    document.getElementById('exec-title').textContent = ex.workflow_name || 'Запуск';
    const badge = document.getElementById('exec-status-badge');
    badge.className = style.badge;
    badge.textContent = STATUS_LABELS[ex.status] || ex.status || '-';
    document.getElementById('exec-workflow').textContent = ex.workflow_name || '-';
    document.getElementById('exec-file').textContent = ex.file_name || '-';
    document.getElementById('exec-language').textContent = ex.language || '-';
    document.getElementById('exec-started').textContent = formatDate(ex.created_at);
    document.getElementById('exec-duration').textContent = duration(ex.started_at, ex.ended_at);

    const errEl = document.getElementById('exec-error');
    if (ex.error_message) {
      errEl.textContent = ex.error_message;
      errEl.classList.remove('hidden');
    } else {
      errEl.classList.add('hidden');
    }

    const restartBtn = document.getElementById('restart-btn');
    if (ex.status === 'failed') {
      restartBtn.classList.remove('hidden');
    } else {
      restartBtn.classList.add('hidden');
    }
  }

  async function renderGraph(nodes, workflowGraph) {
    const svg = document.getElementById('network-svg');
    document.getElementById('network-loading').classList.add('hidden');
    svg.innerHTML = '';

    const statusByNodeId = {};
    nodes.forEach(n => { statusByNodeId[n.node_id] = n; });

    const nodeMapById = {};
    nodes.forEach(n => { nodeMapById[n.id] = n; });

    let displayNodes, displayEdges;

    if (workflowGraph?.nodes) {
      displayNodes = workflowGraph.nodes.map(wn => {
        const en = statusByNodeId[wn.id];
        return {
          id: wn.id,
          node_name: wn.name || en?.node_name || wn.id,
          status: en?.status || 'pending',
          progress_percent: en?.progress_percent ?? null,
          _exec_node_id: en?.id,
        };
      });
      displayEdges = workflowGraph.edges || [];
    } else {
      displayNodes = nodes.map(n => ({
        id: n.node_id,
        node_name: n.node_name || n.node_id,
        status: n.status,
        progress_percent: n.progress_percent,
        _exec_node_id: n.id,
      }));
      displayEdges = [];
    }

    renderNetworkGraph(svg, displayNodes, displayEdges, (clicked) => {
      const execNodeId = clicked._exec_node_id;
      if (execNodeId) showNodeDetail(execNodeId);
    });
  }

  let _nodeDetailInterval = null;
  let _currentNodeDetailId = null;

  async function showNodeDetail(nodeId) {
    if (!_alive) return;
    if (_nodeDetailInterval) { clearInterval(_nodeDetailInterval); _nodeDetailInterval = null; }
    _currentNodeDetailId = nodeId;

    async function fetchAndRender() {
      const node = await api.nodes.getDetail(execId, nodeId);
      if (_currentNodeDetailId !== nodeId) return null;

      const style = STATUS_STYLES[node.status] || STATUS_STYLES.pending;
      const formatKV = (label, val) => {
        if (val == null) return '';
        return `<div class="flex gap-4"><dt class="text-sm text-brand-muted w-36 shrink-0">${label}</dt><dd class="text-sm text-brand-dark break-all">${escapeHtml(String(val))}</dd></div>`;
      };
      const elapsed = node.started_at && node.ended_at ? duration(node.started_at, node.ended_at) : '-';
      const body = `
        <div class="space-y-3">
          <div class="flex gap-4">
            <dt class="text-sm text-brand-muted">Статус</dt>
            <dd><span class="${style.badge}">${STATUS_LABELS[node.status] || node.status}</span></dd>
          </div>
          ${formatKV('node_id', node.node_id)}
          ${formatKV('Запущен', formatDate(node.started_at))}
          ${formatKV('Завершён', formatDate(node.ended_at))}
          ${formatKV('Длительность', elapsed)}
          ${formatKV('Прогресс', node.progress_percent != null ? node.progress_percent + '%' : null)}
          ${formatKV('Сообщение', node.progress_message)}
          ${formatKV('Контейнер', node.container_id)}
          ${formatKV('CPU %', node.cpu_percent != null ? node.cpu_percent.toFixed(1) : null)}
          ${formatKV('Память МБ', node.memory_mb)}
          ${formatKV('Время выполнения мс', node.execution_time_ms)}
          ${formatKV('Ошибка', node.error_message)}
        </div>
        <div class="mt-4 pt-4 border-t border-brand-light">
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-semibold text-brand-dark">Входные данные</h3>
            <button class="text-xs text-brand hover:text-brand-dark view-logs-btn" data-node-id="${nodeId}">Просмотр логов</button>
          </div>
          <pre class="bg-brand-bg p-3 rounded text-xs text-brand-dark overflow-auto max-h-48 font-mono">${escapeHtml(JSON.stringify(node.input_data || {}, null, 2))}</pre>
        </div>
        ${node.output_data ? `
          <div class="mt-4 pt-4 border-t border-brand-light">
            <h3 class="text-sm font-semibold text-brand-dark mb-2">Выходные данные</h3>
            <pre class="bg-brand-bg p-3 rounded text-xs text-brand-dark overflow-auto max-h-48 font-mono">${escapeHtml(JSON.stringify(node.output_data, null, 2))}</pre>
          </div>
        ` : ''}
        ${node.artifacts && node.artifacts.length ? `
          <div class="mt-4 pt-4 border-t border-brand-light">
            <h3 class="text-sm font-semibold text-brand-dark mb-2">Артефакты (${node.artifacts.length})</h3>
            <div class="space-y-1">
              ${node.artifacts.map(art => `
                <div class="flex items-center justify-between gap-4 p-2 rounded bg-brand-bg">
                  <div class="flex items-center gap-2 min-w-0">
                    <span class="text-xs font-medium text-brand-dark truncate">${escapeHtml(art.filename)}</span>
                    <span class="text-xs text-brand-muted">${formatBytes(art.size)}</span>
                    <span class="badge badge-muted">${escapeHtml(art.artifact_type)}</span>
                  </div>
                  <a href="${art.url}" download="${escapeHtml(art.filename || '')}" class="btn-secondary text-xs py-1 px-2 shrink-0" target="_blank" rel="noopener noreferrer">Скачать</a>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      `;
      return { body, node };
    }

    try {
      const first = await fetchAndRender();
      if (!first) return;
      showModal({
        title: escapeHtml(first.node.node_name || first.node.node_id || ''),
        body: first.body,
        width: 'max-w-2xl',
        onClose: () => { if (_nodeDetailInterval) { clearInterval(_nodeDetailInterval); _nodeDetailInterval = null; } },
        onRender: (container) => { bindCollapseHandlers(container); },
      });

      _nodeDetailInterval = setInterval(async () => {
        try {
          if (!_alive) { clearInterval(_nodeDetailInterval); return; }
          if (_currentNodeDetailId !== nodeId) { clearInterval(_nodeDetailInterval); return; }
          if (!document.body.contains(document.getElementById('modal-overlay'))) { clearInterval(_nodeDetailInterval); return; }
          const result = await fetchAndRender();
          if (result) updateModalBody(result.body);
        } catch (_) { clearInterval(_nodeDetailInterval); }
      }, 5000);
    } catch (e) {
      showToast('error', 'Ошибка загрузки узла: ' + e.message);
    }
  }

  function bindCollapseHandlers(container) {
    (container || document).querySelectorAll('.collapse-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        const icon = btn.querySelector('.collapse-icon');
        if (!target) return;
        const isOpen = target.style.maxHeight && target.style.maxHeight !== '0px';
        if (isOpen) {
          target.style.maxHeight = '0px';
          icon.style.transform = '';
        } else {
          target.style.maxHeight = target.scrollHeight + 'px';
          icon.style.transform = 'rotate(180deg)';
        }
      });
    });
  }

  async function showNodeLogs(nodeId) {
    if (!_alive) return;
    try {
      const { attempt, url } = await api.nodes.logs(execId, nodeId);
      const text = await fetch(url).then(r => { if (!r.ok) throw new Error('Failed to fetch logs'); return r.text(); });
      showModal({
        title: `Логи узла — Попытка ${attempt}`,
        body: `<pre class="bg-gray-900 text-green-400 p-4 rounded text-xs font-mono overflow-auto max-h-[60vh]">${escapeHtml(text)}</pre>`,
        width: 'max-w-3xl',
      });
    } catch (e) {
      showToast('error', 'Ошибка загрузки логов: ' + e.message);
    }
  }

  function groupArtifacts(artifacts, nodeNameMap, startedAtMap) {
    const original = artifacts.filter(art => art.artifact_type === 'original');
    const outputFile = artifacts.filter(art => art.artifact_type !== 'original' && art.node_id == null);
    const byNode = {};
    artifacts.forEach(art => {
      if (art.artifact_type !== 'original' && art.node_id != null) {
        const name = nodeNameMap[art.node_id] || art.node_id || 'Неизвестный узел';
        if (!byNode[name]) byNode[name] = [];
        byNode[name].push(art);
      }
    });

    const sortedNodes = Object.keys(byNode).sort((a, b) => {
      const ta = startedAtMap[byNode[a][0].node_id] || '9999';
      const tb = startedAtMap[byNode[b][0].node_id] || '9999';
      return ta.localeCompare(tb);
    });

    return { original, outputFile, byNode, sortedNodes };
  }

  function artifactItem(art, idx) {
    const uid = `art-${art.id || idx}`;
    const filename = escapeHtml(art.name || art.filename || 'download');
    return `
    <div id="${uid}" class="flex items-center justify-between gap-4 p-2 rounded">
      <div class="flex items-center gap-2 min-w-0">
        <span class="text-xs font-medium text-brand-dark truncate">${filename}</span>
        <span class="text-xs text-brand-muted">${formatBytes(art.size_bytes || art.size)}</span>
        <span class="badge badge-muted">${escapeHtml(art.artifact_type)}</span>
      </div>
      <button class="btn-secondary text-xs py-1 px-2 shrink-0 art-download-btn" data-url="${escapeHtml(art.url)}" data-filename="${filename}">Скачать</button>
    </div>`;
  }

  function downloadFile(url, filename) {
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.blob(); })
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(() => {
        window.open(url, '_blank');
      });
  }

  function collapseSectionHtml({ uid, label, content }) {
    return `
    <div class="art-section">
      <button
        class="collapse-toggle w-full flex items-center justify-between p-3 bg-brand-bg rounded text-sm font-medium text-brand-dark"
        data-target="art-group-${uid}"
        style="padding-left:0;padding-right:0;background:transparent;border-radius:0"
      >
        <span>${label}</span>
        <svg class="collapse-icon w-4 h-4 transition-transform duration-200 text-brand-muted flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
        </svg>
      </button>

      <div id="art-group-${uid}" class="collapse-content overflow-hidden transition-all duration-200" style="max-height:0">
        <div style="padding-left: 1.5rem; border-left: 3px solid #e5e7eb; padding-top: 0.5rem; padding-bottom: 0.5rem;">
          ${content}
        </div>
      </div>

      <div class="art-separator" style="height:1px;background:#DCDCDC"></div>
    </div>`;
  }

  async function renderArtifacts(id, nodes) {
    const list = document.getElementById('artifacts-list');
    const empty = document.getElementById('artifacts-empty');
    try {
      const artifacts = await api.artifacts.list(id);
      if (!artifacts.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      const nodeNameMap = {};
      (nodes || []).forEach(n => { if (n.node_name) nodeNameMap[n.node_id] = n.node_name; });
      const startedAtMap = {};
      (nodes || []).forEach(n => { if (n.node_id != null) startedAtMap[n.node_id] = n.started_at || '9999'; });

      const { original, outputFile, byNode, sortedNodes } = groupArtifacts(artifacts, nodeNameMap, startedAtMap);

      // Save which sections are open before re-render
      const openIds = new Set(
        [...list.querySelectorAll('.collapse-content')]
          .filter(el => el.style.maxHeight && el.style.maxHeight !== '0px')
          .map(el => el.id)
      );

      const sections = [];
      if (original.length) {
        sections.push({ uid: 'original', label: 'Входной файл', content: original.map((art, i) => artifactItem(art, 'orig-' + i)).join('') });
      }
      if (outputFile.length) {
        sections.push({ uid: 'output', label: 'Выходной файл', content: outputFile.map((art, i) => artifactItem(art, 'out-' + i)).join('') });
      }
      sortedNodes.forEach(nodeName => {
        const arts = byNode[nodeName];
        const uid = 'node-' + nodeName.replace(/[^a-zA-Z0-9]/g, '_');
        const label = arts.length > 1 ? `${nodeName} (${arts.length})` : nodeName;
        sections.push({ uid, label, content: arts.map((art, i) => artifactItem(art, uid + '-' + i)).join('') });
      });

      list.innerHTML = sections.map(s => collapseSectionHtml(s)).join('');

      // Restore open state (no animation for sections already open before re-render)
      list.querySelectorAll('.collapse-content').forEach(el => {
        const wasOpen = openIds.has(el.id);
        el.style.transition = 'none';
        if (wasOpen) {
          el.style.maxHeight = el.scrollHeight + 'px';
          const btn = list.querySelector(`[data-target="${el.id}"]`);
          if (btn) btn.querySelector('.collapse-icon').style.transform = 'rotate(180deg)';
        } else {
          el.style.maxHeight = '0px';
        }
        // eslint-disable-next-line no-unused-expressions
        el.offsetWidth; // force reflow
        el.style.transition = '';
      });

      list.querySelectorAll('.collapse-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          if (!target) return;
          const isOpen = target.style.maxHeight && target.style.maxHeight !== '0px';
          if (isOpen) {
            target.style.maxHeight = '0px';
            btn.querySelector('.collapse-icon').style.transform = '';
          } else {
            target.style.maxHeight = target.scrollHeight + 'px';
            btn.querySelector('.collapse-icon').style.transform = 'rotate(180deg)';
          }
        });
      });

      list.querySelectorAll('.art-download-btn').forEach(btn => {
        btn.addEventListener('click', () => downloadFile(btn.dataset.url, btn.dataset.filename));
      });
    } catch (e) {
      list.innerHTML = '<p class="text-sm text-red-600">Ошибка загрузки артефактов.</p>';
    }
  }

  async function loadExecution() {
    try {
      const [ex, nodes] = await Promise.all([
        api.executions.get(execId),
        api.executions.getNodes(execId),
      ]);
      renderHeader(ex);
      renderArtifacts(execId, nodes);
      const workflow = ex.workflow_template?.graph || null;
      renderGraph(nodes, workflow);
    } catch (e) {
      showToast('error', 'Ошибка загрузки запуска: ' + e.message);
    }
  }

  document.getElementById('restart-btn').addEventListener('click', async () => {
    if (!confirm('Перезапустить этот запуск?')) return;
    try {
      await api.executions.restart(execId);
      showToast('success', 'Запуск перезапущен.');
      loadExecution();
    } catch (e) {
      showToast('error', e.message);
    }
  });

  document.addEventListener('click', (e) => {
    if (!_alive) return;
    const btn = e.target.closest('.view-logs-btn');
    if (btn) showNodeLogs(btn.dataset.nodeId);
  });

  _alive = true;
  loadExecution();
  const _interval = setInterval(() => {
    if (!_alive) { clearInterval(_interval); return; }
    const el = document.getElementById('exec-id');
    if (!el) { clearInterval(_interval); return; }
    if (el.dataset.execId !== execId) { clearInterval(_interval); return; }
    loadExecution();
  }, 5000);

  window.addEventListener('beforeunload', () => { _alive = false; });
</script>
{% endblock %}
