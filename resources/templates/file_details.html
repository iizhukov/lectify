<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Workflow</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <script
    src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    defer
  ></script>

</head>

<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100">

<div
  x-data="workflowPage()"
  x-init="init()"
  class="min-h-screen"
>

  <!-- HEADER -->
  <header class="sticky top-0 z-50 border-b border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl">

    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <div>

        <h1 class="text-3xl font-bold">
          Workflow
        </h1>

        <p
          class="text-sm text-zinc-500 mt-1"
          x-text="file.filename"
        ></p>

      </div>

      <div class="flex items-center gap-3">

        <a
          href="/"
          class="px-4 py-3 rounded-2xl bg-zinc-200 dark:bg-zinc-800"
        >
          Назад
        </a>

        <button
          @click="toggleTheme()"
          class="px-4 py-3 rounded-2xl bg-zinc-200 dark:bg-zinc-800"
        >
          🌙 / ☀️
        </button>

      </div>

    </div>

  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- FILE INFO -->
    <div class="rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-8 shadow-xl mb-8">

      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

        <div>

          <p class="text-sm text-zinc-500">
            Файл
          </p>

          <p
            class="font-semibold mt-2 break-all"
            x-text="file.filename"
          ></p>

        </div>

        <div>

          <p class="text-sm text-zinc-500">
            Статус
          </p>

          <div
            class="inline-flex mt-2 px-3 py-1 rounded-xl text-sm font-semibold"
            :class="statusBadge(file.status)"
            x-text="file.status"
          ></div>

        </div>

        <div>

          <p class="text-sm text-zinc-500">
            Язык
          </p>

          <p
            class="mt-2"
            x-text="file.language"
          ></p>

        </div>

        <div>

          <p class="text-sm text-zinc-500">
            Создан
          </p>

          <p
            class="mt-2"
            x-text="formatDate(file.created_at)"
          ></p>

        </div>

      </div>

    </div>

    <!-- WORKFLOW -->
    <template x-if="workflow">

      <div class="rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-8 shadow-xl">

        <div class="flex items-center justify-between mb-10">

          <div>

            <h2 class="text-3xl font-bold">
              Workflow Graph
            </h2>

            <p class="text-zinc-500 mt-2">
              DAG workflow execution graph
            </p>

          </div>

          <button
            @click="loadData()"
            class="px-4 py-3 rounded-2xl bg-zinc-200 dark:bg-zinc-800"
          >
            Обновить
          </button>

        </div>

        <!-- GRAPH -->
        <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">

          <template
            x-for="node in workflow.graph.nodes"
            :key="node.id"
          >

            <div
              @click="openNode(node)"
              class="rounded-3xl border p-6 cursor-pointer transition hover:scale-[1.02] shadow-lg"
              :class="nodeColor(node.status)"
            >

              <div class="flex items-start justify-between mb-5">

                <div>

                  <h3
                    class="font-bold text-lg"
                    x-text="node.node_name"
                  ></h3>

                  <p
                    class="text-sm text-zinc-500 mt-1"
                    x-text="node.node_id"
                  ></p>

                </div>

                <div
                  class="w-4 h-4 rounded-full bg-white"
                ></div>

              </div>

              <div class="space-y-3 text-sm">

                <div class="flex justify-between">

                  <span class="text-zinc-500">
                    Статус
                  </span>

                  <span x-text="node.status"></span>

                </div>

                <div class="flex justify-between">

                  <span class="text-zinc-500">
                    Артефакты
                  </span>

                  <span x-text="node.artifacts.length"></span>

                </div>

                <div class="flex justify-between">

                  <span class="text-zinc-500">
                    Зависимости
                  </span>

                  <span x-text="node.dependencies.length"></span>

                </div>

              </div>

              <template x-if="node.dependencies.length">

                <div class="mt-5 pt-5 border-t border-white/10">

                  <p class="text-xs uppercase tracking-wide text-zinc-500 mb-2">
                    Depends On
                  </p>

                  <div class="flex flex-wrap gap-2">

                    <template
                      x-for="dep in node.dependencies"
                    >

                      <div
                        class="px-2 py-1 rounded-lg bg-black/10 dark:bg-white/10 text-xs"
                        x-text="dep"
                      ></div>

                    </template>

                  </div>

                </div>

              </template>

            </div>

          </template>

        </div>

      </div>

    </template>

  </main>

  <!-- NODE MODAL -->
  <div
    x-show="selectedNode"
    x-transition
    class="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6"
  >

    <div
      @click.outside="selectedNode = null"
      class="w-full max-w-3xl rounded-3xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-2xl p-8"
    >

      <div class="flex items-start justify-between mb-8">

        <div>

          <h2
            class="text-3xl font-bold"
            x-text="selectedNode?.node_name"
          ></h2>

          <p
            class="text-zinc-500 mt-2"
            x-text="selectedNode?.status"
          ></p>

        </div>

        <button
          @click="selectedNode = null"
          class="text-2xl"
        >
          ✕
        </button>

      </div>

      <!-- MESSAGE -->
      <div class="mb-8">

        <p class="text-sm text-zinc-500 mb-3">
          Логи / сообщение
        </p>

        <div class="rounded-2xl bg-zinc-100 dark:bg-zinc-800 p-5">

          <pre
            class="whitespace-pre-wrap text-sm"
            x-text="selectedNode?.message || 'Нет данных'"
          ></pre>

        </div>

      </div>

      <!-- ARTIFACTS -->
      <div>

        <div class="flex items-center justify-between mb-5">

          <h3 class="text-xl font-bold">
            Артефакты
          </h3>

          <span
            class="text-sm text-zinc-500"
            x-text="selectedNode?.artifacts?.length + ' файлов'"
          ></span>

        </div>

        <div class="space-y-3">

          <template
            x-for="artifact in selectedNode?.artifacts"
            :key="artifact.id"
          >

            <div
              class="rounded-2xl border border-zinc-200 dark:border-zinc-800 p-4 flex items-center justify-between"
            >

              <div>

                <p
                  class="font-semibold"
                  x-text="artifact.name"
                ></p>

                <div class="flex gap-4 mt-2 text-sm text-zinc-500">

                  <span x-text="artifact.ext"></span>

                  <span x-text="formatSize(artifact.size_bytes)"></span>

                </div>

              </div>

              <a
                :href="'/download/artifacts/' + artifact.id"
                class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold"
              >
                Скачать
              </a>

            </div>

          </template>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

function workflowPage() {

  return {

    fileId: null,

    file: {
      workflows: []
    },

    selectedNode: null,

    pollInterval: null,

    get workflow() {

      return this.file.workflows?.[0] || null

    },

    init() {

      this.fileId = window.location.pathname
        .split("/")
        .pop()

      this.loadData()

      this.pollInterval = setInterval(() => {
        this.loadData()
      }, 3000)

    },

    async loadData() {

      const response = await fetch(
        `/api/files/${this.fileId}`
      )

      this.file = await response.json()

    },

    openNode(node) {

      this.selectedNode = node

    },

    nodeColor(status) {

      switch(status) {

        case "completed":
          return "bg-green-500/10 border-green-500"

        case "running":
          return "bg-orange-500/10 border-orange-500"

        case "failed":
          return "bg-red-500/10 border-red-500"

        default:
          return "bg-zinc-500/10 border-zinc-500"

      }

    },

    statusBadge(status) {

      switch(status) {

        case "completed":
          return "bg-green-500/10 text-green-500"

        case "running":
        case "processing":
          return "bg-orange-500/10 text-orange-500"

        case "failed":
          return "bg-red-500/10 text-red-500"

        default:
          return "bg-zinc-500/10 text-zinc-500"

      }

    },

    formatDate(date) {

      if (!date)
        return "-"

      return new Date(date).toLocaleString()

    },

    formatSize(bytes) {

      if (!bytes)
        return "0 B"

      const units = ["B", "KB", "MB", "GB"]

      let i = 0

      while (bytes >= 1024 && i < units.length - 1) {

        bytes /= 1024

        i++

      }

      return bytes.toFixed(1) + " " + units[i]

    },

    toggleTheme() {

      document.documentElement.classList.toggle("dark")

    }

  }

}

</script>

</body>
</html>
