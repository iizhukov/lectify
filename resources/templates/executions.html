{% extends "base.html" %}

{% block title %}Конспекты{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">

  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
    <h1 class="text-2xl font-bold text-brand-dark">Конспекты</h1>
    <div class="flex items-center gap-3">
      <select id="status-filter" class="input-field w-auto">
        <option value="">Все</option>
        <option value="pending">Ожидание</option>
        <option value="running">Выполняется</option>
        <option value="completed">Завершён</option>
        <option value="failed">Ошибка</option>
      </select>
      <button id="create-execution-btn" class="btn-primary text-sm flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Создать конспект
      </button>
    </div>
  </div>

  <div id="executions-list" class="space-y-3"></div>

  <div id="executions-empty" class="hidden text-center py-16">
    <p class="text-brand-muted">Запусков пока нет.</p>
    <a href="/workflows" class="btn-primary mt-4 inline-block">Перейти к сценариям</a>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script type="module">
  import { api } from '/static/js/api.js';
  import { showToast } from '/static/js/components/toast.js';
  import { showModal, closeModal, activeModal } from '/static/js/components/modal.js';

  let executions = [];

  async function loadExecutions() {
    try {
      executions = await api.executions.list();
      applyFilter();
    } catch (e) {
      showToast('error', 'Ошибка загрузки запусков: ' + e.message);
    }
  }

  function applyFilter() {
    const el = document.getElementById('status-filter');
    if (!el) return;
    const q = el.value;
    const filtered = q ? executions.filter(ex => ex.status === q) : executions;
    renderExecutions(filtered);
  }

  function escapeHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleString('ru-RU', { dateStyle: 'short', timeStyle: 'short' });
  }

  function duration(start, end) {
    if (!start || !end) return '-';
    const ms = new Date(end) - new Date(start);
    if (ms < 0) return '-';
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}с`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}м ${s % 60}с`;
    return `${Math.floor(m / 60)}ч ${m % 60}м`;
  }

  const STATUS_LABELS = {
    completed: 'Завершён',
    running: 'Выполняется',
    failed: 'Ошибка',
    pending: 'Ожидание',
  };

  const STATUS_STYLES = {
    completed: { badge: 'badge-success', dot: 'bg-green-500' },
    running:   { badge: 'badge-warning', dot: 'bg-yellow-500 animate-pulse' },
    failed:    { badge: 'badge-danger',  dot: 'bg-red-500' },
    pending:   { badge: 'badge-muted',   dot: 'bg-gray-400' },
  };

  function renderExecutions(list) {
    const container = document.getElementById('executions-list');
    const empty = document.getElementById('executions-empty');

    if (!list.length) {
      container.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    container.innerHTML = list.map(ex => {
      const style = STATUS_STYLES[ex.status] || STATUS_STYLES.pending;
      const label = STATUS_LABELS[ex.status] || ex.status;
      const elapsed = ex.started_at && ex.ended_at
        ? duration(ex.started_at, ex.ended_at)
        : '-';
      return `
        <div class="card flex items-center justify-between gap-4">
          <div class="flex items-center gap-4 min-w-0">
            <div class="w-3 h-3 rounded-full shrink-0 ${style.dot}"></div>
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <a href="/executions/${ex.id}" class="font-medium text-brand-dark hover:text-brand truncate">
                  ${escapeHtml(ex.workflow_name || 'Сценарий ' + (ex.id || '').slice(0,8))}
                </a>
                <span class="${style.badge}">${label}</span>
              </div>
              <div class="flex items-center gap-3 mt-0.5">
                <span class="text-xs text-brand-muted">${escapeHtml(ex.file_name || '-')}</span>
                <span class="text-xs text-brand-muted">${formatDate(ex.created_at)}</span>
              </div>
              ${ex.error_message ? `<p class="text-xs text-red-600 mt-1 truncate">${escapeHtml(ex.error_message)}</p>` : ''}
            </div>
          </div>
          <div class="flex items-center gap-4 shrink-0">
            <div class="text-right">
              <div class="text-xs text-brand-muted">${elapsed}</div>
              <div class="text-xs text-brand-muted">${ex.language || '-'}</div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('status-filter').addEventListener('change', applyFilter);

  // ── Create execution modal ─────────────────────────────────────────────────
  document.getElementById('create-execution-btn').addEventListener('click', async () => {
    let workflows = [];
    try {
      workflows = await api.workflows.list();
    } catch (e) {
      showToast('error', 'Не удалось загрузить сценарий: ' + e.message);
      return;
    }

    let selectedWorkflow = null;
    let currentFilter = '';
    let uploadedFiles = {}; // {node_id: file_id}
    let uploadPromises = {}; // {node_id: Promise}

    const getInputNodes = (wf) => wf.graph.nodes.filter(n => n.plugin_id === 'input');

    function getAcceptTypes(inputType) {
      const mapping = {
        'audio': 'audio/*',
        'video': 'video/*',
        'pdf': 'application/pdf',
        'text': 'text/*',
        'image': 'image/*',
        'any': '*/*'
      };
      return mapping[inputType] || '*/*';
    }

    function getInputTypeLabel(inputType) {
      const labels = {
        'audio': 'Аудио',
        'video': 'Видео',
        'pdf': 'PDF',
        'text': 'Текст',
        'image': 'Изображение',
        'any': 'Любой файл'
      };
      return labels[inputType] || 'Файл';
    }

    function renderWorkflowList(filter) {
      const q = filter.toLowerCase().trim();
      const filtered = q
        ? workflows.filter(w => w.name.toLowerCase().includes(q) || (w.description || '').toLowerCase().includes(q))
        : workflows;
      if (!filtered.length) {
        return `<p class="text-brand-muted text-sm py-6 text-center">Ничего не найдено.</p>`;
      }
      return filtered.map(wf => {
        const inputNodes = getInputNodes(wf);
        const inputHint = inputNodes.length > 0
          ? `${inputNodes.length} ${inputNodes.length === 1 ? 'входной файл' : 'входных файла'}`
          : 'Без входных файлов';
        return `<button class="w-full text-left card p-3 hover:border-brand transition-colors"
          data-wf-id="${wf.id}">
          <div class="font-medium text-brand-dark">${escapeHtml(wf.name)}</div>
          <div class="text-xs text-brand-muted mt-0.5">${escapeHtml(wf.description || '')}</div>
          <div class="text-xs text-brand-muted mt-1">${inputHint}</div>
        </button>`;
      }).join('');
    }

    function renderFormBody() {
      const inputNodes = getInputNodes(selectedWorkflow);

      if (inputNodes.length === 0) {
        return `<p class="text-brand-muted text-sm">Сценарий не требует входных данных.</p>
          <div class="flex gap-3 mt-5 pt-4 border-t border-brand-light">
            <button id="ce-submit-btn" type="button" class="btn-primary text-sm">Запустить</button>
            <button id="ce-cancel-btn" type="button" class="btn-secondary text-sm">Отмена</button>
          </div>
          <div id="ce-error" class="text-red-600 text-sm mt-2 hidden"></div>`;
      }

      const fileInputsHtml = inputNodes.map(node => {
        const inputType = node.parameters?.input_type || 'any';
        const acceptTypes = getAcceptTypes(inputType);
        const typeLabel = getInputTypeLabel(inputType);
        const nodeId = node.id;

        return `
          <div class="input-file-section" data-node-id="${nodeId}">
            <label class="block text-sm font-medium text-brand-dark mb-2">
              ${escapeHtml(node.name || 'Входной файл')}
              <span class="text-xs text-brand-muted font-normal ml-1">(${typeLabel})</span>
            </label>
            <button type="button" class="ce-file-drop w-full flex items-center gap-3 px-4 py-3 bg-brand/10 hover:bg-brand/20 border border-brand-light rounded-lg transition-colors cursor-pointer"
              data-node-id="${nodeId}">
              <div class="w-10 h-10 rounded-full bg-brand flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
              </div>
              <div class="text-left flex-1">
                <div class="text-sm font-medium text-brand-dark">Выбрать файл</div>
                <div class="text-xs text-brand-muted">${escapeHtml(typeLabel)}</div>
              </div>
            </button>
            <input class="ce-file-input" type="file" accept="${acceptTypes}" data-node-id="${nodeId}" style="display: none;">
            <div class="ce-file-preview hidden mt-2 flex items-center gap-2 text-sm text-brand-dark bg-green-50 border border-green-200 rounded-lg px-3 py-2" data-node-id="${nodeId}">
              <svg class="w-4 h-4 text-green-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span class="ce-file-name truncate flex-1"></span>
              <button type="button" class="ce-file-remove text-brand-muted hover:text-red-500 shrink-0" data-node-id="${nodeId}">✕</button>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="space-y-4">
          ${fileInputsHtml}
          <div class="flex gap-3 mt-5 pt-4 border-t border-brand-light">
            <button id="ce-submit-btn" type="button" class="btn-primary text-sm" disabled>Запустить</button>
            <button id="ce-cancel-btn" type="button" class="btn-secondary text-sm">Отмена</button>
          </div>
          <div id="ce-error" class="text-red-600 text-sm mt-2 hidden"></div>
        </div>
      `;
    }

    function buildModalBody() {
      if (selectedWorkflow) {
        return `
          <div class="flex items-center gap-2 mb-4">
            <button id="ce-back-btn" class="text-brand-muted hover:text-brand text-sm flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
              </svg>
              Назад
            </button>
            <span class="text-sm text-brand-dark font-medium">${escapeHtml(selectedWorkflow.name)}</span>
          </div>
          ${renderFormBody()}
        `;
      }
      return `
        <div class="mb-3">
          <input id="ce-search" type="text" class="input-field w-full"
            placeholder="Поиск по названию...">
        </div>
        <div id="ce-wf-list" class="space-y-2 max-h-80 overflow-y-auto pr-1">
          ${renderWorkflowList(currentFilter)}
        </div>
      `;
    }

    showModal({
      title: 'Создать конспект',
      body: buildModalBody(),
      width: 'max-w-lg',
      onRender() {
        attachWorkflowListeners();

        const searchInput = document.getElementById('ce-search');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            currentFilter = e.target.value;
            const listEl = document.getElementById('ce-wf-list');
            if (listEl) {
              listEl.innerHTML = renderWorkflowList(currentFilter);
              attachWorkflowListeners();
            }
          });
          searchInput.focus();
        }
      },
    });

    function checkAllFilesUploaded() {
      if (!selectedWorkflow) return;
      const inputNodes = getInputNodes(selectedWorkflow);
      if (inputNodes.length === 0) return;

      const allUploaded = inputNodes.every(node => uploadedFiles[node.id]);
      const submitBtn = document.getElementById('ce-submit-btn');
      if (submitBtn) {
        submitBtn.disabled = !allUploaded;
      }
    }

    function refreshBody() {
      const top = activeModal();
      if (!top) return;

      // Reset upload state when changing workflow
      uploadedFiles = {};
      uploadPromises = {};

      top.bodyDiv.innerHTML = buildModalBody();

      // re-attach listeners for new body
      const backBtn = document.getElementById('ce-back-btn');
      if (backBtn) {
        backBtn.addEventListener('click', () => {
          selectedWorkflow = null;
          uploadedFiles = {};
          uploadPromises = {};
          refreshBody();
        });
      }

      // Re-attach workflow list and search listeners
      const searchInput = document.getElementById('ce-search');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          currentFilter = e.target.value;
          const listEl = document.getElementById('ce-wf-list');
          if (listEl) {
            listEl.innerHTML = renderWorkflowList(currentFilter);
            attachWorkflowListeners();
          }
        });
        searchInput.focus();
      }

      attachWorkflowListeners();
      attachFileHandlers();
    }

    function attachWorkflowListeners() {
      const listEl = document.getElementById('ce-wf-list');
      if (listEl) {
        listEl.querySelectorAll('[data-wf-id]').forEach(btn => {
          btn.addEventListener('click', () => {
            selectedWorkflow = workflows.find(w => w.id === btn.dataset.wfId);
            refreshBody();
          });
        });
      }
    }

    function attachFileHandlers() {
      const inputNodes = getInputNodes(selectedWorkflow);
      if (inputNodes.length === 0) return;

      inputNodes.forEach(node => {
        const nodeId = node.id;
        const dropZone = document.querySelector(`.ce-file-drop[data-node-id="${nodeId}"]`);
        const fileInput = document.querySelector(`.ce-file-input[data-node-id="${nodeId}"]`);
        const preview = document.querySelector(`.ce-file-preview[data-node-id="${nodeId}"]`);
        const fileName = preview?.querySelector('.ce-file-name');
        const removeBtn = document.querySelector(`.ce-file-remove[data-node-id="${nodeId}"]`);

        if (!dropZone || !fileInput) return;

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
          if (fileInput.files[0]) setFile(nodeId, fileInput.files[0], dropZone, preview, fileName);
        });

        if (removeBtn) {
          removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.value = '';
            delete uploadedFiles[nodeId];
            delete uploadPromises[nodeId];
            if (preview) preview.classList.add('hidden');
            if (dropZone) dropZone.classList.remove('hidden');
            checkAllFilesUploaded();
          });
        }
      });

      function setFile(nodeId, file, dropZone, preview, fileName) {
        if (preview) {
          preview.classList.remove('hidden');
          if (fileName) fileName.textContent = file.name;
        }
        if (dropZone) dropZone.classList.add('hidden');

        const formData = new FormData();
        formData.append('file', file);
        formData.append('language', 'ru');

        uploadPromises[nodeId] = api.files.upload(formData)
          .then(result => {
            uploadedFiles[nodeId] = result.id;
            delete uploadPromises[nodeId];
            checkAllFilesUploaded();
          })
          .catch(err => {
            showToast('error', `Ошибка загрузки файла: ${err.message}`);
            delete uploadedFiles[nodeId];
            delete uploadPromises[nodeId];
            if (preview) preview.classList.add('hidden');
            if (dropZone) dropZone.classList.remove('hidden');
            checkAllFilesUploaded();
          });
      }
    }

    activeModal().overlay.addEventListener('click', async (e) => {
      const cancelBtn = e.target.closest('#ce-cancel-btn');
      if (cancelBtn) { closeModal(); return; }
      const submitBtn = e.target.closest('#ce-submit-btn');
      if (!submitBtn) return;

      e.preventDefault();
      submitBtn.disabled = true;
      const errEl = document.getElementById('ce-error');
      if (errEl) errEl.classList.add('hidden');

      try {
        // Wait for all pending uploads
        const pendingUploads = Object.values(uploadPromises);
        if (pendingUploads.length > 0) {
          await Promise.all(pendingUploads);
        }

        const inputNodes = getInputNodes(selectedWorkflow);

        // Check if workflow uses input nodes (new format)
        if (inputNodes.length > 0) {
          // Verify all files are uploaded
          const missingFiles = inputNodes.filter(node => !uploadedFiles[node.id]);
          if (missingFiles.length > 0) {
            showToast('error', 'Пожалуйста, загрузите все файлы');
            submitBtn.disabled = false;
            return;
          }

          // New API format with input_files
          await api.workflows.execute(selectedWorkflow.id, {
            language: 'ru',
            input_files: uploadedFiles
          });
        } else {
          // Old format for backward compatibility (workflows without input nodes)
          await api.workflows.execute(selectedWorkflow.id, {
            language: 'ru',
            parameters: {}
          });
        }

        closeModal();
        showToast('success', 'Конспект запущен!');
        loadExecutions();
      } catch (err) {
        const errEl = document.getElementById('ce-error');
        if (errEl) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
      } finally {
        submitBtn.disabled = false;
      }
    });
  });

  let _alive = false;
  loadExecutions();
  _alive = true;
  const _interval = setInterval(() => {
    if (!_alive) { clearInterval(_interval); return; }
    if (!document.getElementById('status-filter')) { clearInterval(_interval); return; }
    loadExecutions();
  }, 8000);
  window.addEventListener('beforeunload', () => { _alive = false; });
</script>
{% endblock %}
