<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Lectify</title>
  <link href="/static/css/output.css" rel="stylesheet">
  <link href="/static/favicon.svg" rel="icon" type="image/svg+xml">
</head>
<body class="bg-brand-bg min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-brand">Lectify</h1>
    </div>

    <div class="card p-6">
      <h2 class="text-xl font-semibold text-brand-dark mb-6">Set new password</h2>

      <form id="reset-form" class="space-y-4">
        <input type="hidden" id="token" value="">
        <div>
          <label class="block text-sm font-medium text-brand-dark mb-1" for="password">New password</label>
          <input type="password" id="password" name="password" class="input-field" placeholder="Min 8 characters" required minlength="8" autofocus>
        </div>
        <div>
          <label class="block text-sm font-medium text-brand-dark mb-1" for="password_confirm">Confirm password</label>
          <input type="password" id="password_confirm" name="password_confirm" class="input-field" placeholder="Repeat password" required minlength="8">
        </div>
        <div id="reset-error" class="text-red-600 text-sm hidden"></div>
        <button type="submit" class="btn-primary w-full py-2.5">Reset password</button>
      </form>

      <div class="mt-4 text-center">
        <a href="/login" class="text-sm text-brand hover:text-brand-dark">Back to sign in</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <script type="module">
    import { api } from '/static/js/api.js';
    import { showToast } from '/static/js/components/toast.js';

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    if (!token) {
      document.getElementById('reset-form').innerHTML =
        '<p class="text-red-600 text-sm">Missing reset token. <a href="/forgot-password" class="text-brand">Request a new one.</a></p>';
    }

    document.getElementById('token').value = token;

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      const password = document.getElementById('password').value;
      const password_confirm = document.getElementById('password_confirm').value;
      const errorEl = document.getElementById('reset-error');
      errorEl.classList.add('hidden');

      if (password !== password_confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Reset password';
        return;
      }

      try {
        await api.auth.resetPassword(token, password);
        showToast('success', 'Password reset. Please sign in.');
        setTimeout(() => { window.location.href = '/login'; }, 1500);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Reset password';
      }
    });
  </script>
</body>
</html>
