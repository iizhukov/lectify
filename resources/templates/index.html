<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Lectify - ИИ Конспектирование</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gray: {
              850: '#1f2937',
              900: '#111827',
            }
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">

<div x-data="app()" x-init="init()" class="min-h-screen">

  <!-- HEADER -->
  <header class="bg-gray-800 border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-blue-400">Lectify</h1>
        <p class="text-sm text-gray-400 mt-1">ИИ Конспектирование лекций</p>
      </div>
      <div class="flex items-center gap-3">
        <a href="/workflows" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition">Workflows</a>
        <a href="/executions" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition">Executions</a>
        <a href="/prompts" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition">Prompts</a>
        <button @click="openUploadModal()" class="px-5 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 transition font-semibold">
          Загрузить
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="max-w-7xl mx-auto px-6 py-10">

    <!-- Queue Status -->
    <div class="mb-8 rounded-2xl bg-gray-800 border border-gray-700 p-6">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-xl font-bold mb-1">Статус обработки</h3>
          <p class="text-sm text-gray-400">Система может обрабатывать до <span x-text="queueStatus.max_concurrent"></span> файлов одновременно</p>
        </div>
        <div class="flex items-center gap-8">
          <div class="text-center">
            <div class="text-3xl font-bold text-orange-500" x-text="queueStatus.active_workflows"></div>
            <div class="text-sm text-gray-400 mt-1">Активных</div>
          </div>
          <div class="text-center">
            <div class="text-3xl font-bold text-blue-500" x-text="queueStatus.queue_size"></div>
            <div class="text-sm text-gray-400 mt-1">В очереди</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Active Executions -->
    <template x-if="activeExecutions.length > 0">
      <div class="mb-8">
        <h2 class="text-2xl font-bold mb-4">Активные выполнения</h2>
        <div class="space-y-3">
          <template x-for="exec in activeExecutions" :key="exec.id">
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <div class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></div>
                  <div>
                    <div class="font-medium" x-text="'Execution ' + exec.id.slice(0,8)"></div>
                    <div class="text-sm text-gray-400" x-text="exec.status"></div>
                  </div>
                </div>
                <a :href="'/executions/' + exec.id" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm">
                  Следить
                </a>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Recent Files -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-bold">Загруженные файлы</h2>
        <p class="text-gray-400 mt-1">История обработанных лекций</p>
      </div>
      <button @click="loadFiles()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition">
        Обновить
      </button>
    </div>

    <div class="space-y-4">
      <template x-for="file in files" :key="file.id">
        <div class="bg-gray-800 rounded-xl border border-gray-700 p-5 hover:border-blue-500 transition cursor-pointer"
             @click="window.location.href='/executions?file_id=' + file.id">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4 min-w-0">
              <div class="w-3 h-3 rounded-full shrink-0" :class="statusColor(file.status)"></div>
              <div class="min-w-0">
                <h3 class="font-bold text-lg truncate" x-text="file.filename"></h3>
                <div class="flex flex-wrap gap-4 mt-2 text-sm text-gray-400">
                  <span>ID: <span x-text="file.id.slice(0,8)"></span></span>
                  <span>Язык: <span x-text="file.language"></span></span>
                  <span>Размер: <span x-text="formatSize(file.size_bytes)"></span></span>
                </div>
              </div>
            </div>
            <div class="text-right shrink-0 ml-6">
              <span class="inline-flex px-3 py-1 rounded-lg text-sm font-semibold"
                    :class="statusBadge(file.status)" x-text="file.status"></span>
              <p class="text-sm text-gray-500 mt-2" x-text="formatDate(file.created_at)"></p>
            </div>
          </div>
        </div>
      </template>

      <template x-if="files.length === 0">
        <div class="rounded-2xl border-2 border-dashed border-gray-700 p-16 text-center">
          <h3 class="text-2xl font-bold mb-3">Пока нет файлов</h3>
          <p class="text-gray-500 mb-6">Загрузите первую лекцию для обработки</p>
          <button @click="openUploadModal()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold transition">
            Загрузить файл
          </button>
        </div>
      </template>
    </div>
  </main>

  <!-- Upload Modal -->
  <div x-show="showUploadModal" x-transition class="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6"
       @click.outside="closeUploadModal()">
    <div class="w-full max-w-xl bg-gray-800 rounded-2xl border border-gray-700 shadow-2xl p-8">
      <div class="flex items-start justify-between mb-6">
        <div>
          <h2 class="text-2xl font-bold">Загрузка лекции</h2>
          <p class="text-gray-400 mt-1">Поддерживаются видео и аудио файлы</p>
        </div>
        <button @click="closeUploadModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
      </div>

      <form @submit.prevent="uploadFile()" class="space-y-5">
        <div>
          <label class="block mb-2 text-sm font-medium">Файл</label>
          <input type="file" @change="onFileChange" accept=".mp4,.mp3,.wav,.mkv,.avi,.mov,.webm,.m4a"
                 class="block w-full rounded-xl border border-gray-600 bg-gray-700 p-4 text-sm"/>
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium">Язык</label>
          <select x-model="language" class="w-full rounded-xl border border-gray-600 bg-gray-700 p-4">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
          </select>
        </div>

        <template x-if="selectedFiles.length > 0">
          <div class="rounded-xl bg-gray-700 p-4 text-sm space-y-2">
            <div class="flex justify-between font-semibold">
              <span class="text-gray-400">Выбрано:</span>
              <span x-text="selectedFiles.length + ' файл(ов)'"></span>
            </div>
            <template x-for="file in selectedFiles" :key="file.name">
              <div class="flex justify-between text-xs">
                <span class="truncate mr-2" x-text="file.name"></span>
                <span class="text-gray-400 shrink-0" x-text="formatSize(file.size)"></span>
              </div>
            </template>
          </div>
        </template>

        <button type="submit" :disabled="uploading"
                class="w-full px-5 py-4 rounded-xl bg-blue-600 hover:bg-blue-700 disabled:opacity-50 font-semibold transition">
          <span x-show="!uploading">Загрузить</span>
          <span x-show="uploading">Загрузка...</span>
        </button>
      </form>
    </div>
  </div>

</div>

<script>
function app() {
  return {
    files: [],
    activeExecutions: [],
    queueStatus: { active_workflows: 0, max_concurrent: 3, queue_size: 0 },
    showUploadModal: false,
    selectedFiles: [],
    uploading: false,
    language: 'ru',
    pollInterval: null,

    init() {
      this.loadFiles();
      this.loadQueueStatus();
      this.loadActiveExecutions();
      this.pollInterval = setInterval(() => {
        this.loadFiles();
        this.loadQueueStatus();
        this.loadActiveExecutions();
      }, 3000);
    },

    async loadFiles() {
      try {
        const response = await fetch('/api/files');
        this.files = await response.json();
      } catch (e) {
        console.error('Failed to load files', e);
      }
    },

    async loadActiveExecutions() {
      try {
        const response = await fetch('/api/workflows/executions');
        const all = await response.json();
        this.activeExecutions = all.filter(e => ['pending', 'running'].includes(e.status));
      } catch (e) {
        console.error('Failed to load executions', e);
      }
    },

    async loadQueueStatus() {
      try {
        const response = await fetch('/api/queue/status');
        this.queueStatus = await response.json();
      } catch (e) {
        console.error('Failed to load queue status', e);
      }
    },

    openUploadModal() { this.showUploadModal = true; },
    closeUploadModal() { this.showUploadModal = false; },

    onFileChange(event) {
      this.selectedFiles = Array.from(event.target.files);
    },

    async uploadFile() {
      if (this.selectedFiles.length === 0) {
        alert('Выберите файл');
        return;
      }

      this.uploading = true;
      let success = 0, fail = 0;

      for (const file of this.selectedFiles) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('language', this.language);
        try {
          const response = await fetch('/api/upload', { method: 'POST', body: formData });
          if (response.ok) success++;
          else fail++;
        } catch (e) { fail++; }
      }

      this.uploading = false;
      alert(`Загружено: ${success}, Ошибок: ${fail}`);
      this.selectedFiles = [];
      this.closeUploadModal();
      await this.loadFiles();
      await this.loadQueueStatus();
    },

    statusColor(status) {
      return { completed: 'bg-green-500', processing: 'bg-orange-500', running: 'bg-orange-500', failed: 'bg-red-500' }[status] || 'bg-gray-500';
    },

    statusBadge(status) {
      return { completed: 'bg-green-500/10 text-green-500', processing: 'bg-orange-500/10 text-orange-500', running: 'bg-orange-500/10 text-orange-500', failed: 'bg-red-500/10 text-red-500' }[status] || 'bg-gray-500/10 text-gray-500';
    },

    formatDate(date) { return date ? new Date(date).toLocaleString('ru-RU') : '-'; },

    formatSize(bytes) {
      if (!bytes) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
      return bytes.toFixed(1) + ' ' + units[i];
    }
  };
}
</script>

</body>
</html>
