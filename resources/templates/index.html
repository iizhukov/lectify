<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ИИ Конспектирование</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <script
    src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    defer
  ></script>

  <style>
    .glass {
      backdrop-filter: blur(12px);
    }
  </style>
</head>

<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors">

<div
  x-data="app()"
  x-init="init()"
  class="min-h-screen"
>

  <!-- HEADER -->
  <header class="sticky top-0 z-50 border-b border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-900/80 glass">

    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <div>
        <h1 class="text-3xl font-bold">
          ИИ Конспектирование
        </h1>

        <p class="text-sm text-zinc-500 mt-1">
          Видео → Markdown → LaTeX → PDF
        </p>
      </div>

      <div class="flex items-center gap-3">

        <button
          @click="openUploadModal()"
          class="px-5 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition"
        >
          Загрузить
        </button>

        <button
          @click="toggleTheme()"
          class="px-4 py-3 rounded-2xl bg-zinc-200 dark:bg-zinc-800 hover:scale-105 transition"
        >
          🌙 / ☀️
        </button>

      </div>

    </div>

  </header>

  <!-- FILES -->
  <main class="max-w-7xl mx-auto px-6 py-10">

    <!-- QUEUE STATUS -->
    <div class="mb-8 rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-6 shadow-lg">
      
      <div class="flex items-center justify-between">
        
        <div>
          <h3 class="text-xl font-bold mb-2">
            Статус обработки
          </h3>
          <p class="text-sm text-zinc-500">
            Система может обрабатывать до <span x-text="queueStatus.max_concurrent"></span> файлов одновременно
          </p>
        </div>

        <div class="flex items-center gap-6">
          
          <div class="text-center">
            <div class="text-3xl font-bold text-orange-500" x-text="queueStatus.active_workflows"></div>
            <div class="text-sm text-zinc-500 mt-1">Активных</div>
          </div>

          <div class="text-center">
            <div class="text-3xl font-bold text-blue-500" x-text="queueStatus.queue_size"></div>
            <div class="text-sm text-zinc-500 mt-1">В очереди</div>
          </div>

        </div>

      </div>

    </div>

    <div class="flex items-center justify-between mb-8">

      <div>
        <h2 class="text-4xl font-bold">
          Загруженные файлы
        </h2>

        <p class="text-zinc-500 mt-2">
          История обработанных лекций и workflow
        </p>
      </div>

      <button
        @click="loadFiles()"
        class="px-4 py-3 rounded-2xl bg-zinc-200 dark:bg-zinc-800"
      >
        Обновить
      </button>

    </div>

    <div
      class="space-y-4"
    >

      <template x-for="file in files" :key="file.id">

        <a
          :href="'/files/' + file.id"
          class="group flex items-center justify-between rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-6 shadow-lg hover:shadow-2xl transition"
        >

          <div class="flex items-center gap-5 min-w-0">

            <div
              class="w-4 h-4 rounded-full shrink-0"
              :class="statusColor(file.status)"
            ></div>

            <div class="min-w-0">

              <h3
                class="font-bold text-lg truncate"
                x-text="file.filename"
              ></h3>

              <div class="flex flex-wrap gap-4 mt-2 text-sm text-zinc-500">

                <span>
                  ID:
                  <span x-text="file.id"></span>
                </span>

                <span>
                  Язык:
                  <span x-text="file.language"></span>
                </span>

                <span>
                  Размер:
                  <span x-text="formatSize(file.size_bytes)"></span>
                </span>

              </div>

            </div>

          </div>

          <div class="text-right shrink-0 ml-6">

            <div
              class="inline-flex px-3 py-1 rounded-xl text-sm font-semibold"
              :class="statusBadge(file.status)"
              x-text="file.status"
            ></div>

            <p
              class="text-sm text-zinc-500 mt-2"
              x-text="formatDate(file.created_at)"
            ></p>

          </div>

        </a>

      </template>

      <template x-if="files.length === 0">

        <div class="rounded-3xl border border-dashed border-zinc-300 dark:border-zinc-700 p-20 text-center">

          <h3 class="text-2xl font-bold mb-3">
            Пока нет файлов
          </h3>

          <p class="text-zinc-500 mb-6">
            Загрузите первую лекцию для обработки
          </p>

          <button
            @click="openUploadModal()"
            class="px-5 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-semibold"
          >
            Загрузить файл
          </button>

        </div>

      </template>

    </div>

  </main>

  <!-- UPLOAD MODAL -->
  <div
    x-show="showUploadModal"
    x-transition
    class="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6"
  >

    <div
      @click.outside="closeUploadModal()"
      class="w-full max-w-xl rounded-3xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-2xl p-8"
    >

      <div class="flex items-start justify-between mb-8">

        <div>
          <h2 class="text-3xl font-bold">
            Загрузка лекции
          </h2>

          <p class="text-zinc-500 mt-2">
            Поддерживаются видео и аудио файлы
          </p>
        </div>

        <button
          @click="closeUploadModal()"
          class="text-2xl"
        >
          ✕
        </button>

      </div>

      <form
        @submit.prevent="uploadFile()"
        class="space-y-6"
      >

        <div>

          <label class="block mb-2 text-sm font-medium">
            Файл (можно выбрать несколько)
          </label>

          <input
            type="file"
            multiple
            @change="onFileChange"
            class="block w-full rounded-2xl border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 p-4"
          />

        </div>

        <div>

          <label class="block mb-2 text-sm font-medium">
            Язык
          </label>

          <select
            x-model="language"
            class="w-full rounded-2xl border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 p-4"
          >
            <option value="ru">
              Русский
            </option>

            <option value="en">
              English
            </option>

          </select>

        </div>

        <template x-if="selectedFiles.length > 0">

          <div class="rounded-2xl bg-zinc-100 dark:bg-zinc-800 p-4 text-sm space-y-3">

            <div class="flex justify-between font-semibold">
              <span class="text-zinc-500">Выбрано файлов</span>
              <span x-text="selectedFiles.length"></span>
            </div>

            <template x-for="file in selectedFiles" :key="file.name">
              <div class="flex justify-between text-xs">
                <span class="truncate mr-2" x-text="file.name"></span>
                <span class="text-zinc-500 shrink-0" x-text="formatSize(file.size)"></span>
              </div>
            </template>

          </div>

        </template>

        <button
          type="submit"
          :disabled="uploading"
          class="w-full px-5 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold transition"
        >

          <span x-show="!uploading">
            Загрузить
          </span>

          <span x-show="uploading">
            Загрузка...
          </span>

        </button>

      </form>

    </div>

  </div>

</div>

<script>

function app() {

  return {

    files: [],

    queueStatus: {
      active_workflows: 0,
      max_concurrent: 3,
      queue_size: 0
    },

    showUploadModal: false,

    selectedFiles: [],

    uploading: false,

    language: "ru",

    pollInterval: null,

    init() {

      this.loadFiles()
      this.loadQueueStatus()

      this.pollInterval = setInterval(() => {
        this.loadFiles()
        this.loadQueueStatus()
      }, 3000)

    },

    async loadFiles() {

      const response = await fetch("/api/files")

      this.files = await response.json()

    },

    async loadQueueStatus() {

      try {
        const response = await fetch("/api/queue/status")
        this.queueStatus = await response.json()
      } catch (e) {
        console.error("Failed to load queue status", e)
      }

    },

    openUploadModal() {
      this.showUploadModal = true
    },

    closeUploadModal() {
      this.showUploadModal = false
    },

    onFileChange(event) {

      this.selectedFiles = Array.from(event.target.files)

    },

    async uploadFile() {

      if (this.selectedFiles.length === 0) {
        alert("Выберите хотя бы один файл")
        return
      }

      this.uploading = true

      let successCount = 0
      let failCount = 0

      for (const file of this.selectedFiles) {
        
        const formData = new FormData()
        formData.append("file", file)
        formData.append("language", this.language)

        try {
          const response = await fetch("/upload", {
            method: "POST",
            body: formData
          })

          if (response.ok) {
            successCount++
          } else {
            failCount++
          }
        } catch (e) {
          failCount++
        }
      }

      this.uploading = false

      if (failCount > 0) {
        alert(`Загружено: ${successCount}, Ошибок: ${failCount}`)
      } else {
        alert(`Успешно загружено ${successCount} файл(ов)`)
      }

      this.selectedFiles = []

      this.closeUploadModal()

      await this.loadFiles()

    },

    statusColor(status) {

      switch(status) {

        case "completed":
          return "bg-green-500"

        case "processing":
        case "running":
          return "bg-orange-500"

        case "failed":
          return "bg-red-500"

        default:
          return "bg-zinc-400"

      }

    },

    statusBadge(status) {

      switch(status) {

        case "completed":
          return "bg-green-500/10 text-green-500"

        case "processing":
        case "running":
          return "bg-orange-500/10 text-orange-500"

        case "failed":
          return "bg-red-500/10 text-red-500"

        default:
          return "bg-zinc-500/10 text-zinc-500"

      }

    },

    formatDate(date) {

      if (!date)
        return "-"

      return new Date(date).toLocaleString()

    },

    formatSize(bytes) {

      if (!bytes)
        return "0 B"

      const units = ["B", "KB", "MB", "GB"]

      let i = 0

      while (bytes >= 1024 && i < units.length - 1) {
        bytes /= 1024
        i++
      }

      return bytes.toFixed(1) + " " + units[i]

    },

    toggleTheme() {

      document.documentElement.classList.toggle("dark")

    }

  }

}

</script>

</body>
</html>
